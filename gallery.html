<!DOCTYPE html>

<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📸 Party Galerie</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#1f6f73,#3fa39b);
color:white;
text-align:center;
}

h1{
margin:0;
padding:20px;
}

/* Grid Galerie */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
padding:12px;
max-width:1200px;
margin:auto;
}

.gallery img{
width:100%;
border-radius:12px;
cursor:pointer;
transition:transform 0.2s;
}

.gallery img:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<h1>📸 Party Galerie</h1>

<div class="gallery" id="gallery"></div>

<script>

const token = "X7fK3RMRtgo8FbA";

/* WebDAV Pfad */

const webdav =
"https://nx70782.your-storageshare.de/public.php/webdav/";

/* Dateien laden */

async function loadImages(){

const res = await fetch(webdav,{
method:"PROPFIND",
headers:{
Authorization:"Basic "+btoa(token+":"),
Depth:"1"
}
});

const text = await res.text();

const parser = new DOMParser();
const xml = parser.parseFromString(text,"text/xml");

const responses=[...xml.getElementsByTagName("d:response")];

const files = responses.map(r=>{

const href=r.getElementsByTagName("d:href")[0].textContent;
const modified=r.getElementsByTagName("d:getlastmodified")[0]?.textContent;

return {href,modified};

}).filter(f=>f.href.match(/\.(jpg|jpeg|png|webp)$/i));

/* neueste zuerst */

files.sort((a,b)=>new Date(b.modified)-new Date(a.modified));

const gallery=document.getElementById("gallery");

gallery.innerHTML="";

files.forEach(file=>{

let img=document.createElement("img");

img.src=file.href;

img.onclick=()=>{
window.open(file.href,"_blank");
};

gallery.appendChild(img);

});

}

loadImages();

/* alle 15 Sekunden aktualisieren */

setInterval(loadImages,15000);

</script>

</body>
</html>
