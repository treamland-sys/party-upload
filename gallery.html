<!DOCTYPE html>

<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📸 Party Galerie</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#1f6f73,#3fa39b);
color:white;
text-align:center;
}

h1{
padding:20px;
margin:0;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:12px;
padding:12px;
max-width:1200px;
margin:auto;
}

.gallery img{
width:100%;
border-radius:12px;
cursor:pointer;
transition:transform 0.2s;
}

.gallery img:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<h1>📸 Party Galerie</h1>

<div class="gallery" id="gallery"></div>

<script>

const share =
"https://nx70782.your-storageshare.de/s/X7fK3RMRtgo8FbA";

/* Share Seite laden */

async function loadGallery(){

const res = await fetch(share);
const html = await res.text();

/* Bildlinks suchen */

const matches = [...html.matchAll(/href="([^"]+\.(jpg|jpeg|png|webp))"/gi)];

const images = matches.map(m=>m[1]);

const gallery = document.getElementById("gallery");

gallery.innerHTML="";

images.forEach(src=>{

const img=document.createElement("img");

img.src=src;

img.onclick=()=>window.open(src);

gallery.appendChild(img);

});

}

loadGallery();

setInterval(loadGallery,15000);

</script>

</body>
</html>
