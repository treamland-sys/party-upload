<!DOCTYPE html>

<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📸 Party Galerie</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#1f6f73,#3fa39b);
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

.controls{
display:flex;
justify-content:center;
gap:12px;
margin-top:15px;
flex-wrap:wrap;
}

.btn{
background:#ffd54f;
border:none;
padding:14px 22px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
font-size:16px;
color:black;
text-decoration:none;
}

.info{
margin-top:8px;
font-size:14px;
}

.gallery{
column-count:4;
column-gap:12px;
max-width:1200px;
margin:auto;
padding:12px;
}

.photo{
break-inside:avoid;
margin-bottom:12px;
}

.photo img{
width:100%;
border-radius:12px;
cursor:pointer;
}

@media(max-width:900px){
.gallery{column-count:3;}
}

@media(max-width:600px){
.gallery{column-count:2;}
}

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.viewer img{
max-width:95%;
max-height:95%;
border-radius:10px;
}

</style>

</head>

<body>

<h1>📸 Party Galerie</h1>

<div class="controls">

<a href="/" class="btn">
📤 Fotos hochladen
</a>

</div>

<div class="info" id="newPhotos"></div>

<div class="gallery" id="gallery"></div>

<script>

async function loadImages(){

const res = await fetch("/gallery");
const images = await res.json();

checkNewPhotos(images.length);

const gallery=document.getElementById("gallery");
gallery.innerHTML="";

images.reverse().forEach(path=>{

const filename = path.split("/").pop();
const imgURL = "/image?file="+filename;

const container=document.createElement("div");
container.className="photo";

const img=document.createElement("img");
img.src=imgURL;

img.onclick=()=>{

const viewer=document.createElement("div");
viewer.className="viewer";

const big=document.createElement("img");
big.src=imgURL;

viewer.appendChild(big);
viewer.onclick=()=>viewer.remove();

document.body.appendChild(viewer);

};

container.appendChild(img);
gallery.appendChild(container);

});

}

function checkNewPhotos(current){

const last=localStorage.getItem("photoCount");

if(last){

const diff=current-last;

if(diff>0){

document.getElementById("newPhotos").innerText =
"🆕 "+diff+" neue Fotos seit deinem letzten Besuch";

}

}

localStorage.setItem("photoCount",current);

}

loadImages();

/* Galerie aktualisiert automatisch */
setInterval(loadImages,15000);

</script>

</body>
</html>
