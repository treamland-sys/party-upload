<!DOCTYPE html>

<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📸 Party Galerie</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#1f6f73,#3fa39b);
color:white;
text-align:center;
}

h1{
margin:0;
padding:20px;
}

.controls{
margin-bottom:10px;
}

.btn{
background:#ffd54f;
border:none;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin:6px;
text-decoration:none;
color:black;
display:inline-block;
}

.counter{
font-size:14px;
opacity:0.9;
margin-top:5px;
}

.gallery{
column-count:4;
column-gap:12px;
max-width:1200px;
margin:auto;
padding:12px;
}

.photo{
position:relative;
break-inside:avoid;
margin-bottom:12px;
}

.photo img{
width:100%;
border-radius:12px;
cursor:pointer;
}

.photo input{
position:absolute;
top:10px;
left:10px;
width:22px;
height:22px;
}

.photo.selected img{
outline:6px solid #ffd54f;
}

@media(max-width:900px){
.gallery{column-count:3;}
}

@media(max-width:600px){
.gallery{column-count:2;}
}

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.viewer img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

</style>

</head>

<body>

<h1>📸 Party Galerie</h1>

<div class="controls">

<button onclick="downloadSelected()" class="btn">
⬇ Ausgewählte Fotos
</button>

<a href="/" class="btn">
📤 Fotos hochladen
</a>

<div class="counter" id="selectedCount">
0 Fotos ausgewählt
</div>

<div class="counter" id="newPhotos"></div>

</div>

<div class="gallery" id="gallery"></div>

<script>

let selected=[];

async function loadImages(){

const res = await fetch("/gallery");
const images = await res.json();

checkNewPhotos(images);

const gallery=document.getElementById("gallery");
gallery.innerHTML="";

images.reverse().forEach(path=>{

const filename = path.split("/").pop();
const url = "/image?file=" + filename;

const container=document.createElement("div");
container.className="photo";

const img=document.createElement("img");
img.src=url;

const checkbox=document.createElement("input");
checkbox.type="checkbox";

checkbox.onchange=()=>{

if(checkbox.checked){

container.classList.add("selected");
selected.push(url);

}else{

container.classList.remove("selected");
selected=selected.filter(i=>i!==url);

}

updateCounter();

};

img.onclick=()=>{

const viewer=document.createElement("div");
viewer.className="viewer";

const big=document.createElement("img");
big.src=url;

viewer.appendChild(big);
viewer.onclick=()=>viewer.remove();

document.body.appendChild(viewer);

};

container.appendChild(img);
container.appendChild(checkbox);

gallery.appendChild(container);

});

}

function updateCounter(){

document.getElementById("selectedCount").innerText =
selected.length + " Fotos ausgewählt";

}

async function downloadSelected(){

if(selected.length===0){
alert("Keine Fotos ausgewählt");
return;
}

const res = await fetch("/zip",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({files:selected})
});

const blob = await res.blob();

const link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = "party_fotos.zip";

document.body.appendChild(link);
link.click();
link.remove();

}

function checkNewPhotos(images){

const lastCount = localStorage.getItem("photoCount");

if(lastCount){

const diff = images.length - lastCount;

if(diff > 0){

document.getElementById("newPhotos").innerText =
"🆕 " + diff + " neue Fotos seit deinem letzten Besuch";

}

}

localStorage.setItem("photoCount", images.length);

}

loadImages();
setInterval(loadImages,15000);

</script>

</body>
</html>
