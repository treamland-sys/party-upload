<!DOCTYPE html>

<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📸 Party Galerie</title>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#1f6f73,#3fa39b);
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

.controls{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-top:15px;
}

.btn{
background:#ffd54f;
border:none;
padding:14px 20px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
font-size:16px;
text-decoration:none;
color:black;
}

.info{
margin-top:8px;
font-size:14px;
}

.gallery{
column-count:4;
column-gap:12px;
max-width:1200px;
margin:auto;
padding:12px;
}

.photo{
position:relative;
break-inside:avoid;
margin-bottom:12px;
}

.photo img{
width:100%;
border-radius:12px;
cursor:pointer;
}

.photo input{
position:absolute;
top:10px;
left:10px;
width:22px;
height:22px;
}

.photo.selected img{
outline:5px solid #ffd54f;
}

@media(max-width:900px){
.gallery{column-count:3;}
}

@media(max-width:600px){
.gallery{column-count:2;}
}

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.viewer img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

</style>

</head>

<body>

<h1>📸 Party Galerie</h1>

<div class="controls">

<button class="btn" onclick="downloadSelected()">
⬇ Ausgewählte Fotos
</button>

<a href="/" class="btn">
📤 Fotos hochladen
</a>

</div>

<div class="info" id="selectedCount">
0 Fotos ausgewählt
</div>

<div class="info" id="newPhotos"></div>

<div class="info" id="zipStatus"></div>

<div class="gallery" id="gallery"></div>

<script>

let selected=[];

async function loadImages(){

const res = await fetch("/gallery");
const images = await res.json();

checkNewPhotos(images.length);

const gallery=document.getElementById("gallery");
gallery.innerHTML="";

images.reverse().forEach(path=>{

const filename = path.split("/").pop();

/* DIREKTER NEXTCLOUD LINK */

const url = "https://nx70782.your-storageshare.de/public.php/webdav/"+filename+"?download=1";

const container=document.createElement("div");
container.className="photo";

const img=document.createElement("img");
img.src="/image?file="+filename;

const checkbox=document.createElement("input");
checkbox.type="checkbox";

checkbox.onchange=()=>{

if(checkbox.checked){

container.classList.add("selected");
selected.push(url);

}else{

container.classList.remove("selected");
selected=selected.filter(i=>i!==url);

}

updateCounter();

};

img.onclick=()=>{

const viewer=document.createElement("div");
viewer.className="viewer";

const big=document.createElement("img");
big.src=img.src;

viewer.appendChild(big);
viewer.onclick=()=>viewer.remove();

document.body.appendChild(viewer);

};

container.appendChild(img);
container.appendChild(checkbox);

gallery.appendChild(container);

});

}

function updateCounter(){

document.getElementById("selectedCount").innerText =
selected.length + " Fotos ausgewählt";

}

function checkNewPhotos(current){

const last=localStorage.getItem("photoCount");

if(last){

const diff=current-last;

if(diff>0){

document.getElementById("newPhotos").innerText =
"🆕 "+diff+" neue Fotos seit deinem letzten Besuch";

}

}

localStorage.setItem("photoCount",current);

}
async function downloadSelected(){

if(selected.length===0){
alert("Keine Fotos ausgewählt");
return;
}

const status=document.getElementById("zipStatus");
status.innerText="📦 Lade Bilder...";

const zip=new JSZip();

/* alle Bilder gleichzeitig laden */

const requests = selected.map(async (url,index)=>{

status.innerText =
"📦 Lade Bild "+(index+1)+" von "+selected.length;

const res = await fetch(url);

if(!res.ok){
throw new Error("Bild konnte nicht geladen werden");
}

const blob = await res.blob();

const filename = "foto_"+index+".jpg";

zip.file(filename,blob);

});

/* warten bis alle Bilder geladen */

await Promise.all(requests);

status.innerText="📦 Komprimiere Fotos...";

const content = await zip.generateAsync({type:"blob"});

const link=document.createElement("a");
link.href=URL.createObjectURL(content);
link.download="party_fotos.zip";

document.body.appendChild(link);
link.click();
link.remove();

status.innerText="✅ Download gestartet";

}


loadImages();

setInterval(loadImages,15000);

</script>

</body>
</html>
