<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>📸 Party Galerie</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f3d3e;
color:white;
padding:20px;
}

h1{
text-align:center;
}

/* Topbar */

.topbar{

display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;

margin-bottom:20px;

}

.button{

width:200px;
height:42px;

display:flex;
justify-content:center;
align-items:center;

border-radius:10px;

background:#ffd54f;
color:black;

font-weight:bold;
text-decoration:none;

}

.download{
background:#fff3b0;
}

/* Counter */

.counter{
text-align:center;
margin-bottom:20px;
}

/* Collage Galerie */

.gallery{

column-count:4;
column-gap:12px;

max-width:1100px;
margin:auto;

}

.photo{
break-inside:avoid;
margin-bottom:12px;
}

.photo img{

width:100%;
border-radius:10px;
cursor:pointer;

transition:0.2s;

}

.photo img:hover{
transform:scale(1.03);
}

/* Vollbild */

.viewer{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:black;

display:flex;
justify-content:center;
align-items:center;

}

.viewer img{
max-width:95%;
max-height:95%;
}

/* Responsive */

@media(max-width:1000px){
.gallery{column-count:3;}
}

@media(max-width:700px){
.gallery{column-count:2;}
}

@media(max-width:450px){
.gallery{column-count:1;}
}

</style>

</head>

<body>

<h1>📸 Party Galerie</h1>

<div class="topbar">

<a class="button" href="/">🏠 Fotos hochladen</a>

<a class="button download"
href="https://nx70782.your-storageshare.de/s/X7fK3RMRtgo8FbA"
target="_blank">

⬇ Fotos herunterladen

</a>

</div>

<div class="counter">

<div id="total">Fotos werden geladen...</div>
<div id="new"></div>

</div>

<div class="gallery" id="gallery"></div>

<script>

let lastImageCount = 0;

async function loadGallery(){

const res = await fetch("/gallery");
const images = await res.json();

/* nur aktualisieren wenn neue Bilder */

if(images.length !== lastImageCount){

lastImageCount = images.length;

buildGallery(images);

}

}

/* neueste oben */

images = images.sort().reverse();

document.getElementById("total").innerHTML =
"📸 "+images.length+" Fotos insgesamt";

const lastSeen = localStorage.getItem("lastSeenCount") || 0;

const newCount = images.length - lastSeen;

if(newCount>0){

document.getElementById("new").innerHTML =
"✨ "+newCount+" neue Fotos seit deinem letzten Besuch";

}

const gallery = document.getElementById("gallery");

images.forEach(path=>{

const file = path.split("/").pop();

const url = "/image?file="+file;

const div = document.createElement("div");
div.className="photo";

const img = document.createElement("img");

img.src=url;

img.onclick = ()=>{

const viewer=document.createElement("div");
viewer.className="viewer";

const big=document.createElement("img");
big.src=url;

viewer.appendChild(big);

viewer.onclick=()=>viewer.remove();

document.body.appendChild(viewer);

};

div.appendChild(img);
gallery.appendChild(div);

});

localStorage.setItem("lastSeenCount",images.length);

}

loadGallery();

/* Auto Refresh */

setInterval(loadGallery, 8000);

</script>

</body>
</html>
