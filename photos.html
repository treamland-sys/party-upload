<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>📸 Party Galerie</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f3d3e;
color:white;
padding:20px;
}

h1{
text-align:center;
}

.gallery{

column-count:3;
column-gap:10px;

max-width:900px;
margin:auto;

}

.photo{
break-inside:avoid;
margin-bottom:10px;
}

.photo img{

width:100%;
border-radius:10px;
cursor:pointer;

}

.viewer{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:black;

display:flex;
align-items:center;
justify-content:center;

}

.viewer img{
max-width:95%;
max-height:95%;
}

</style>

</head>

<body>

<h1>📸 Party Galerie</h1>

<div class="gallery" id="gallery"></div>

<script>

async function load(){

const res=await fetch("/gallery");
const images=await res.json();

const gallery=document.getElementById("gallery");

images.reverse().forEach(path=>{

const file=path.split("/").pop();
const url="/image?file="+file;

const div=document.createElement("div");
div.className="photo";

const img=document.createElement("img");
img.src=url;

img.onclick=()=>{

const viewer=document.createElement("div");
viewer.className="viewer";

const big=document.createElement("img");
big.src=url;

viewer.appendChild(big);

viewer.onclick=()=>viewer.remove();

document.body.appendChild(viewer);

};

div.appendChild(img);
gallery.appendChild(div);

});

}

load();

</script>

</body>
</html>
