<!DOCTYPE html>

<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📸 Party Galerie</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#1f6f73,#3fa39b);
color:white;
text-align:center;
}

h1{
margin:0;
padding:20px;
font-size:28px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:12px;
padding:12px;
max-width:1200px;
margin:auto;
}

.gallery img{
width:100%;
border-radius:12px;
cursor:pointer;
transition:transform 0.2s;
}

.gallery img:hover{
transform:scale(1.05);
}

@media(max-width:600px){
.gallery{
grid-template-columns:repeat(2,1fr);
}
}

</style>

</head>

<body>

<h1>📸 Party Galerie</h1>

<div class="gallery" id="gallery"></div>

<script>

const shareToken = "X7fK3RMRtgo8FbA";

async function loadImages(){

try{

const res = await fetch("/gallery");
const images = await res.json();

const gallery = document.getElementById("gallery");

gallery.innerHTML="";

images.reverse().forEach(path=>{

/* Dateiname extrahieren */

const filename = path.split("/").pop();

/* Öffentlichen Download-Link bauen */

const url =
"https://nx70782.your-storageshare.de/s/" +
shareToken +
"/download?path=/&files=" +
filename;

const img = document.createElement("img");

img.src = url;

img.loading = "lazy";

img.onclick = ()=>window.open(url,"_blank");

gallery.appendChild(img);

});

}catch(err){

document.getElementById("gallery").innerHTML =
"<p>Galerie konnte nicht geladen werden.</p>";

}

}

loadImages();

setInterval(loadImages,15000);

</script>

</body>
</html>
