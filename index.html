<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🎉 Ellis 40. Geburtstag</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
color:white;

background-image:url("https://images.unsplash.com/photo-1513151233558-d860c5398176");
background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;
}

.card{

background:rgba(0,0,0,0.45);
backdrop-filter:blur(12px);

border-radius:20px;

padding:25px;

width:100%;
max-width:380px;

text-align:center;

}

h1{
margin-top:0;
font-size:26px;
}

.button{

display:block;

margin:12px auto;

padding:14px;

max-width:240px;
width:100%;

border-radius:12px;

font-weight:bold;
text-decoration:none;

cursor:pointer;

}

.upload{
background:#ffd54f;
color:black;
}

.gallery{
background:#fff3b0;
color:black;
}

.counter{
margin:10px 0;
font-weight:bold;
}

input{
display:none;
}

</style>

</head>

<body>

<div class="card">

<h1>🎉 Ellis 40. Geburtstag</h1>

<p>
Lade hier deine schönsten Fotos von der Party hoch.
</p>

<div id="counter" class="counter">
📸 Fotos werden gezählt...
</div>

<label class="button upload">
📸 Fotos hochladen
<input type="file" id="fileInput" multiple>
</label>

<a class="button gallery" href="/photos.html">
🖼 Galerie ansehen
</a>

</div>

<script>

/* Counter laden */

async function loadCounter(){

const res = await fetch("/count");
const data = await res.json();

document.getElementById("counter").innerHTML =
"📸 "+data.count+" Fotos wurden bereits hochgeladen";

}

loadCounter();

/* Upload */

const input=document.getElementById("fileInput");

input.addEventListener("change", async function(){

for(const file of input.files){

await fetch("/upload",{
method:"POST",
headers:{
"x-file-name":file.name
},
body:file
});

}

confetti({
particleCount:150,
spread:80,
origin:{y:0.6}
});

loadCounter();

});

</script>

</body>
</html>
