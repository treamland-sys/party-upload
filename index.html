<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ellis 40. Geburtstag</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:"Poppins",sans-serif;

background:
linear-gradient(rgba(0,0,0,0.25),rgba(0,0,0,0.35)),
url("https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=1600");

background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

color:white;

padding:40px 20px;

}

/* Karte */

.card{

background:rgba(20,50,55,0.80);

backdrop-filter:blur(6px);

padding:28px 24px;

border-radius:22px;

max-width:360px;
width:100%;

box-shadow:0 15px 40px rgba(0,0,0,0.5);

}

/* Titel */

h2{

font-size:28px;
margin-bottom:10px;
line-height:1.3;

}

/* Text */

p{

font-size:15px;
line-height:1.6;
margin-bottom:16px;

}

/* Counter */

#counter{

margin-bottom:18px;
font-size:15px;

}

/* Buttons */

.button{

display:block;

width:100%;
max-width:260px;

margin:10px auto;

padding:14px;

border-radius:12px;

font-size:16px;
font-weight:600;

text-decoration:none;

cursor:pointer;

transition:all 0.25s ease;

}

/* Upload Button */

.upload{

background:#ffd43b;
color:#222;

animation:pulse 2s infinite;

}

/* Galerie */

.gallery{

background:#f6e8a5;
color:#333;

}

/* Download */

.download{

background:#d9d9d9;
color:#333;

}

.button:hover{

transform:scale(1.05);

}

/* pulsieren */

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}

}

/* Upload Balken */

.progress{

margin-top:14px;

background:rgba(255,255,255,0.25);

height:10px;

border-radius:10px;

overflow:hidden;

}

.bar{

width:0%;
height:100%;

background:#22c55e;

transition:width 0.3s;

}

#status{

margin-top:8px;
font-size:13px;

}

/* Footer */

.footer{

margin-top:18px;
font-size:13px;
opacity:0.9;

}

input{
display:none;
}

/* Mobile Optimierung */

@media (max-width:480px){

.card{

max-width:320px;
padding:24px 20px;

}

h2{
font-size:24px;
}

.button{

font-size:15px;
padding:13px;

}

}

</style>

</head>


<body>

<div class="card">

<h2>🎉 Ellis 40. Geburtstag</h2>

<p>Schön, dass du mitfeierst!</p>

<p>

Lade hier deine schönsten Fotos und Videos
von der Party hoch, damit wir die besten
Erinnerungen sammeln können.

</p>

<div id="counter">📸 Fotos werden gezählt...</div>


<label class="button upload">

📸 Fotos hochladen

<input type="file" id="fileInput" multiple>

</label>


<a class="button gallery" href="/photos.html">

🖼 Galerie ansehen

</a>


<a class="button download"
href="https://nx70782.your-storageshare.de/s/X7fK3RMRtgo8FbA"
target="_blank">

📁 Fotos später herunterladen

</a>


<div id="status"></div>


<div class="progress">
<div class="bar" id="bar"></div>
</div>


<div class="footer">

Danke fürs Mitfeiern und Teilen der Erinnerungen 🙌

</div>

</div>



<script>

/* Counter laden */

async function loadCounter(){

try{

const res = await fetch("/count");
const data = await res.json();

document.getElementById("counter").innerHTML =
"📸 "+data.count+" Fotos hochgeladen";

}catch{

document.getElementById("counter").innerHTML =
"📸 Fotos werden gesammelt";

}

}

loadCounter();



/* Upload */

const input=document.getElementById("fileInput");

const bar=document.getElementById("bar");
const status=document.getElementById("status");


input.addEventListener("change", async function(){

const files=input.files;

for(let file of files){

status.innerHTML="Upload läuft...";

let xhr=new XMLHttpRequest();

xhr.open("POST","/upload");

xhr.setRequestHeader("x-file-name",file.name);

xhr.upload.onprogress=function(e){

if(e.lengthComputable){

let percent=(e.loaded/e.total)*100;
bar.style.width=percent+"%";

}

};

xhr.onload=function(){

status.innerHTML="Upload erfolgreich 🎉";

confetti({

particleCount:120,
spread:70,
origin:{y:0.6}

});

bar.style.width="100%";

setTimeout(()=>{

bar.style.width="0%";

},1200);

loadCounter();

};

xhr.onerror=function(){

status.innerHTML="Upload Fehler";

};

xhr.send(file);

}

});

</script>

</body>
</html>
