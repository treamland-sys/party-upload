<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🎉 Ellis 40. Geburtstag</title>

<style>

body{

margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;

background-image:url("https://images.unsplash.com/photo-1513151233558-d860c5398176");
background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;
padding:20px;

}

/* Glas Karte */

.card{

background:rgba(0,0,0,0.45);
backdrop-filter:blur(12px);

border-radius:20px;

padding:35px 25px;

width:100%;
max-width:420px;

box-shadow:0 20px 60px rgba(0,0,0,0.4);

}

h1{
margin-top:0;
font-size:30px;
}

.subtitle{
font-size:18px;
margin-bottom:18px;
}

.text{
font-size:16px;
line-height:1.5;
margin-bottom:25px;
}

/* Buttons */

.button{

display:block;
margin:14px auto;

padding:18px;

border-radius:14px;

font-size:20px;
font-weight:bold;

text-decoration:none;

width:100%;
max-width:300px;

}

/* Upload pulsierend */

.upload{

background:#ffd54f;
color:black;

animation:pulse 2.5s infinite;

}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.06)}
100%{transform:scale(1)}

}

.gallery{

background:#fff3b0;
color:black;

}

.download{

background:#ffffffd6;
color:black;

}

.footer{

margin-top:25px;
font-size:14px;
opacity:0.9;

}

/* Mobile Optimierung */

@media (max-width:600px){

.card{
padding:28px 18px;
}

h1{
font-size:24px;
}

.subtitle{
font-size:16px;
}

.button{
font-size:17px;
padding:16px;
}

}

</style>

</head>

<body>

<div class="card">

<h1>🎉 Ellis 40. Geburtstag</h1>

<div class="subtitle">
Schön, dass du mitfeierst!
</div>

<div class="text">
Lade hier deine schönsten Fotos von der Party hoch,
damit wir die besten Erinnerungen sammeln können.
</div>

<a class="button upload" href="/">
📸 Fotos hochladen
</a>

<a class="button gallery" href="/photos.html">
🖼 Galerie ansehen
</a>

<a class="button download"
href="https://nx70782.your-storageshare.de/s/X7fK3RMRtgo8FbA"
target="_blank">

📁 Fotos später herunterladen

</a>

<div class="footer">
Danke fürs Mitfeiern und Teilen der Erinnerungen 🥂
</div>

</div>

</body>
</html>
