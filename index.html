<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🎉 Ellis 40. Geburtstag</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;

background-image:url("https://images.unsplash.com/photo-1513151233558-d860c5398176");
background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;
color:white;
}

/* Card */

.card{

background:rgba(0,0,0,0.45);
backdrop-filter:blur(10px);

border-radius:20px;

padding:25px;

width:100%;
max-width:380px;

text-align:center;

}

/* Buttons Container */

.buttons{

display:flex;
flex-direction:column;
align-items:center;
gap:12px;

}

/* Button */

.button{

display:flex;
justify-content:center;
align-items:center;

width:100%;
max-width:240px;

padding:14px;

border-radius:12px;

font-weight:bold;
text-decoration:none;

cursor:pointer;

}

.upload{
background:#ffd54f;
color:black;
}

.gallery{
background:#fff3b0;
color:black;
}

.counter{
margin:12px 0;
font-weight:bold;
}

input{
display:none;
}

/* Mobile */

@media (max-width:500px){

.card{
padding:20px;
}

.button{
max-width:200px;
padding:12px;
}

}

</style>

</head>

<body>

<div class="card">

<h2>🎉 Ellis 40. Geburtstag</h2>

<p>Lade hier deine schönsten Partyfotos hoch.</p>

<div id="counter" class="counter">
📸 Fotos werden gezählt...
</div>

<div class="buttons">

<label class="button upload">
📸 Fotos hochladen
<input type="file" id="fileInput" multiple>
</label>

<a class="button gallery" href="/photos.html">
🖼 Galerie ansehen
</a>

</div>

</div>

<script>

/* Counter */

async function loadCounter(){

const res = await fetch("/count");
const data = await res.json();

document.getElementById("counter").innerHTML =
"📸 "+data.count+" Fotos hochgeladen";

}

loadCounter();

/* Upload */

const input=document.getElementById("fileInput");

input.addEventListener("change", async function(){

for(const file of input.files){

await fetch("/upload",{
method:"POST",
headers:{
"x-file-name":file.name
},
body:file
});

}

confetti({
particleCount:150,
spread:80
});

loadCounter();

});

</script>

</body>
</html>
