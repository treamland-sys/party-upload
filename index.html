<!DOCTYPE html>

<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ellis 40. Geburtstag</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
background-image:url("https://images.unsplash.com/photo-1513151233558-d860c5398176");
background-size:cover;
background-position:center;
}

/* Glas-Karte */

.card{
background:rgba(0,0,0,0.35);
backdrop-filter:blur(8px);
padding:40px;
border-radius:22px;
width:90%;
max-width:420px;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* Titel */

h1{
font-size:30px;
margin-bottom:10px;
}

.subtitle{
font-size:18px;
opacity:0.9;
margin-bottom:20px;
}

/* Text */

p{
font-size:16px;
line-height:1.5;
opacity:0.9;
}

/* Counter */

#counter{
margin:18px 0;
font-size:18px;
}

/* Upload Button */

.upload-btn{
background:#ffd54f;
color:#333;
padding:18px 28px;
font-size:20px;
border-radius:12px;
font-weight:bold;
display:inline-block;
cursor:pointer;
margin-top:15px;
text-decoration:none;
}

.upload-btn:hover{
transform:scale(1.05);
}

/* Galerie Button */

.gallery-btn{
background:white;
color:#333;
padding:14px 24px;
font-size:16px;
border-radius:10px;
display:block;
margin-top:12px;
text-decoration:none;
}

/* Progressbar */

.progress{
width:100%;
background:rgba(255,255,255,0.25);
border-radius:10px;
margin-top:18px;
overflow:hidden;
height:14px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:width 0.2s;
}

input{
display:none;
}

#status{
margin-top:15px;
}

</style>

</head>

<body>

<div class="card">

<h1>🎉 Ellis 40. Geburtstag</h1>

<div class="subtitle">
Schön, dass du mitfeierst!
</div>

<p>
Lade hier deine schönsten Fotos und Videos von der Party hoch,
damit wir die besten Erinnerungen sammeln können.
</p>

<div id="counter">📸 Fotos werden gezählt...</div>

<label class="upload-btn">
📸 Fotos hochladen
<input type="file" id="fileInput" multiple>
</label>

<a class="gallery-btn"
href="https://nx70782.your-storageshare.de/s/X7fK3RMRtgo8FbA"
target="_blank">

🖼 Fotos ansehen

</a>

<div id="status"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<p style="margin-top:20px;font-size:13px;">
Danke fürs Mitfeiern und Teilen der Erinnerungen 🥂
</p>

</div>

<script>

/* Fotozähler */

async function loadCounter(){

try{

const res = await fetch("/count");
const data = await res.json();

document.getElementById("counter").innerHTML =
"📸 "+data.count+" Fotos wurden schon hochgeladen";

}catch(e){

document.getElementById("counter").innerHTML =
"📸 Fotos werden gesammelt";

}

}

loadCounter();

/* Upload */

const input=document.getElementById("fileInput");
const status=document.getElementById("status");
const bar=document.getElementById("bar");

input.addEventListener("change", async function(){

let files=input.files;

for(let file of files){

status.innerHTML="Upload läuft...";

let xhr=new XMLHttpRequest();

xhr.open("POST","/upload");

xhr.setRequestHeader("x-file-name",file.name);

xhr.upload.onprogress=function(e){

if(e.lengthComputable){

let percent=(e.loaded/e.total)*100;
bar.style.width=percent+"%";

}

};

xhr.onload=function(){

status.innerHTML="Upload erfolgreich 🎉";

confetti({
particleCount:180,
spread:100,
origin:{y:0.6}
});

bar.style.width="100%";

setTimeout(()=>{
bar.style.width="0%";
},1500);

input.value="";

setTimeout(loadCounter,1000);

};

xhr.onerror=function(){

status.innerHTML="Upload Fehler";

};

xhr.send(file);

}

});

</script>

</body>
</html>
