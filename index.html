<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🎉 Ellis 40. Geburtstag</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;

background-image:url("https://images.unsplash.com/photo-1513151233558-d860c5398176");
background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;
}

/* Glas Panel */

.card{

background:rgba(0,0,0,0.45);
backdrop-filter:blur(12px);

border-radius:20px;

padding:30px 20px;

width:100%;
max-width:420px;

box-shadow:0 20px 60px rgba(0,0,0,0.4);

text-align:center;

}

h1{
margin-top:0;
font-size:28px;
}

.subtitle{
font-size:17px;
margin-bottom:18px;
}

.text{
font-size:15px;
line-height:1.5;
margin-bottom:22px;
}

/* Button Container */

.buttons{

display:flex;
flex-direction:column;
align-items:center;
gap:14px;

}

/* Buttons */

.button{

display:flex;
justify-content:center;
align-items:center;

width:100%;
max-width:280px;

padding:16px 18px;

border-radius:14px;

font-size:18px;
font-weight:bold;

text-decoration:none;

}

/* Upload pulsierend */

.upload{
background:#ffd54f;
color:black;
animation:pulse 2.4s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

.gallery{
background:#fff3b0;
color:black;
}

.download{
background:#ffffffd0;
color:black;
}

.footer{
margin-top:20px;
font-size:14px;
opacity:0.9;
}

/* Mobile Anpassung */

@media(max-width:420px){

.card{
padding:26px 16px;
}

.button{
font-size:17px;
padding:14px;
}

h1{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="card">

<h1>🎉 Ellis 40. Geburtstag</h1>

<div class="subtitle">
Schön, dass du mitfeierst!
</div>

<div class="text">
Lade hier deine schönsten Fotos von der Party hoch,
damit wir die besten Erinnerungen sammeln können.
</div>

<div class="buttons">

<a class="button upload" href="/">
📸 Fotos hochladen
</a>

<a class="button gallery" href="/photos.html">
🖼 Galerie ansehen
</a>

<a class="button download"
href="https://nx70782.your-storageshare.de/s/X7fK3RMRtgo8FbA"
target="_blank">

📁 Fotos später herunterladen

</a>

</div>

<div class="footer">
Danke fürs Mitfeiern und Teilen der Erinnerungen 🙌
</div>

</div>

</body>
</html>
