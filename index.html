<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>40. Geburtstag – Fotos teilen</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background-image:url("https://images.unsplash.com/photo-1530103862676-de8c9debad1d");
background-size:cover;
background-position:center;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

.overlay{
background:rgba(0,0,0,0.55);
width:100%;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.card{
background:rgba(255,255,255,0.12);
border-radius:22px;
padding:50px 40px;
max-width:520px;
width:100%;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.icon{
font-size:60px;
margin-bottom:10px;
}

h1{
font-size:40px;
margin-bottom:15px;
}

p{
font-size:20px;
line-height:1.5;
margin-bottom:35px;
}

.button{
display:inline-block;
background:#ffd166;
color:#333;
padding:18px 36px;
font-size:22px;
border-radius:14px;
text-decoration:none;
font-weight:bold;
transition:all 0.2s ease;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.button:hover{
transform:scale(1.05);
}

.footer{
margin-top:25px;
font-size:14px;
opacity:0.85;
}

/* -------- MOBILE OPTIMIERUNG -------- */

@media (max-width:600px){

.card{
padding:35px 25px;
}

h1{
font-size:30px;
}

p{
font-size:18px;
}

.button{
font-size:20px;
padding:16px 28px;
width:100%;
}

}

</style>
</head>

<body>

<div class="overlay">

<div class="card">

<div class="icon">🎉</div>

<h1>Ellis 40. Geburtstag</h1>

<p>
Schön, dass du mitfeierst!<br><br>
Lade hier deine schönsten Fotos und Videos von der Party hoch,
damit wir die besten Erinnerungen sammeln können.
<label class="button">
📸 Fotos hochladen
<input type="file" id="fileInput" multiple>
</label>

<a class="button" href="https://nx70782.your-storageshare.de/s/X7fK3RMRtgo8FbA" target="_blank">
🖼 Fotos ansehen
</a>

<div id="status"></div>

</div>

<script>

/* Luftballons */

const colors=["#ffd166","#ef476f","#06d6a0","#118ab2","#ff4d6d"];

for(let i=0;i<12;i++){

let b=document.createElement("div");
b.className="balloon";

b.style.background=colors[Math.floor(Math.random()*colors.length)];
b.style.left=Math.random()*100+"vw";
b.style.animationDuration=(10+Math.random()*8)+"s";

document.body.appendChild(b);

}

/* Upload */

const input=document.getElementById("fileInput");
const status=document.getElementById("status");

input.addEventListener("change", async function(){

let files=input.files;

status.innerHTML="";

for(let file of files){

status.innerHTML="Upload läuft...";

let xhr=new XMLHttpRequest();

xhr.open("POST","/upload");

xhr.setRequestHeader("x-file-name",file.name);

xhr.onload=function(){

status.innerHTML="Upload erfolgreich 🎉";

confetti({
particleCount:160,
spread:80,
origin:{y:0.6}
});

input.value="";

};

xhr.onerror=function(){

status.innerHTML="Upload Fehler";

};

xhr.send(file);

}

});

</script>

</body>
</html>
