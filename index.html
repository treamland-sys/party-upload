<!DOCTYPE html>

<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ellis 40. Geburtstag</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
overflow:hidden;

/* Stilvoller Hintergrund */

background:
radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,255,255,0.07), transparent 40%),
radial-gradient(circle at 50% 90%, rgba(255,255,255,0.05), transparent 50%),
linear-gradient(135deg,#1f6f73,#2f8f87,#3fa39b);
}


/* Hintergrund Konfetti */

body:before{
content:"";
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle at 20% 30%,rgba(255,255,255,0.15),transparent 40%),
radial-gradient(circle at 70% 60%,rgba(255,255,255,0.15),transparent 40%);
}

/* Karte */

.card{
position:relative;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
padding:40px;
border-radius:24px;
width:90%;
max-width:440px;
box-shadow:0 25px 60px rgba(0,0,0,0.5);
}

/* Titel */

h1{
font-size:34px;
margin-bottom:8px;
}

.subtitle{
font-size:20px;
opacity:0.9;
margin-bottom:18px;
}

/* Beschreibung */

.description{
font-size:17px;
line-height:1.5;
opacity:0.9;
margin-bottom:18px;
}

/* Counter */

#counter{
font-size:19px;
margin-bottom:24px;
}

/* Upload Button */

.upload-btn{
background:#ffd54f;
color:#333;
padding:20px 30px;
font-size:22px;
border-radius:16px;
font-weight:bold;
display:block;
cursor:pointer;
margin:10px auto;
text-decoration:none;
width:100%;
max-width:280px;
animation:pulse 2.5s infinite;
}

/* Galerie Button */

.gallery-btn{
background:#fff3b0;
color:#333;
padding:20px 30px;
font-size:22px;
border-radius:16px;
font-weight:bold;
display:block;
cursor:pointer;
margin:10px auto;
text-decoration:none;
width:100%;
max-width:280px;
}

/* Hover */

.upload-btn:hover,
.gallery-btn:hover{
transform:scale(1.05);
}

/* Pulsieren */

@keyframes pulse{

0%{
box-shadow:0 0 0 0 rgba(255,213,79,0.7);
}

70%{
box-shadow:0 0 0 18px rgba(255,213,79,0);
}

100%{
box-shadow:0 0 0 0 rgba(255,213,79,0);
}

}

/* Status */

#status{
margin-top:16px;
font-size:18px;
}

/* Progress */

.progress{
width:100%;
background:rgba(255,255,255,0.25);
border-radius:12px;
margin-top:20px;
overflow:hidden;
height:16px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:width 0.2s;
}

input{
display:none;
}

/* Footer */

.footer{
margin-top:25px;
font-size:14px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="card">

<h1>🎉 Ellis 40. Geburtstag</h1>

<div class="subtitle">
Schön, dass du mitfeierst!
</div>

<div class="description">
Lade hier deine schönsten Fotos und Videos von der Party hoch,
damit wir die besten Erinnerungen sammeln können.
</div>

<div id="counter">📸 Fotos werden gezählt...</div>

<label class="upload-btn">
📸 Fotos hochladen
<input type="file" id="fileInput" multiple>
</label>

<a class="gallery-btn"
href="https://nx70782.your-storageshare.de/s/X7fK3RMRtgo8FbA"
target="_blank">

🖼 Fotos ansehen

</a>

<div id="status"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="footer">
Danke fürs Mitfeiern und Teilen der Erinnerungen 🥂
</div>

</div>

<script>

/* Fotozähler */

async function loadCounter(){

try{

const res = await fetch("/count");
const data = await res.json();

document.getElementById("counter").innerHTML =
"📸 "+data.count+" Fotos wurden schon hochgeladen";

}catch(e){

document.getElementById("counter").innerHTML =
"📸 Fotos werden gesammelt";

}

}

loadCounter();

/* Upload */

const input=document.getElementById("fileInput");
const status=document.getElementById("status");
const bar=document.getElementById("bar");

input.addEventListener("change", async function(){

let files=input.files;

for(let file of files){

status.innerHTML="Upload läuft...";

let xhr=new XMLHttpRequest();

xhr.open("POST","/upload");

xhr.setRequestHeader("x-file-name",file.name);

xhr.upload.onprogress=function(e){

if(e.lengthComputable){

let percent=(e.loaded/e.total)*100;
bar.style.width=percent+"%";

}

};

xhr.onload=function(){

status.innerHTML="Upload erfolgreich 🎉";

confetti({
particleCount:180,
spread:100,
origin:{y:0.6}
});

bar.style.width="100%";
