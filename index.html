<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🎉 Ellis 40. Geburtstag</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;

background-image:url("https://images.unsplash.com/photo-1513151233558-d860c5398176");
background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:15px;
}

/* Glas Karte */

.card{

background:rgba(0,0,0,0.45);
backdrop-filter:blur(12px);

border-radius:20px;

padding:26px 18px;

width:100%;
max-width:360px;

box-shadow:0 20px 60px rgba(0,0,0,0.4);

text-align:center;

}

h1{
margin-top:0;
font-size:24px;
}

.subtitle{
font-size:16px;
margin-bottom:16px;
}

.text{
font-size:14px;
line-height:1.5;
margin-bottom:20px;
}

/* Buttons */

.buttons{

display:flex;
flex-direction:column;
align-items:center;
gap:12px;

}

.button{

display:flex;
align-items:center;
justify-content:center;

width:100%;
max-width:220px;

padding:12px;

border-radius:12px;

font-size:15px;
font-weight:bold;

cursor:pointer;
text-decoration:none;

}

/* Upload */

.upload{

background:#ffd54f;
color:black;

animation:pulse 2.3s infinite;

}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}

}

.gallery{

background:#fff3b0;
color:black;

}

.download{

background:#ffffffd0;
color:black;

}

.footer{

margin-top:16px;
font-size:13px;
opacity:0.9;

}

input{
display:none;
}

</style>

</head>

<body>

<div class="card">

<h1>🎉 Ellis 40. Geburtstag</h1>

<div class="subtitle">
Schön, dass du mitfeierst!
</div>

<div class="text">
Lade hier deine schönsten Fotos und Videos von der Party hoch,
damit wir die besten Erinnerungen sammeln können.
</div>

<div class="buttons">

<label class="button upload">
📸 Fotos hochladen
<input type="file" id="fileInput" multiple>
</label>

<a class="button gallery" href="/photos.html">
🖼 Galerie ansehen
</a>

<a class="button download"
href="https://nx70782.your-storageshare.de/s/X7fK3RMRtgo8FbA"
target="_blank">
📁 Fotos später herunterladen
</a>

</div>

<div class="footer">
Danke fürs Mitfeiern und Teilen der Erinnerungen 🙌
</div>

</div>

<script>


async function loadCounter(){

const res = await fetch("/count");
const data = await res.json();

document.getElementById("counter").innerHTML =
"📸 "+data.count+" Fotos hochgeladen";

}

loadCounter();

const input=document.getElementById("fileInput");

input.addEventListener("change", async function(){

for(const file of input.files){

await fetch("/upload",{
method:"POST",
headers:{
"x-file-name":file.name
},
body:file
});

}

confetti({
particleCount:150,
spread:80
});

loadCounter();

});

</script>

</body>
</html>
