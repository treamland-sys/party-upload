<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Party Fotos</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#ff7a5c,#ffb56b);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
color:white;
}

.card{
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:20px;
width:90%;
max-width:420px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
backdrop-filter:blur(6px);
}

h1{
margin-top:0;
font-size:32px;
}

#counter{
margin-bottom:15px;
font-size:18px;
}

.button{
display:block;
margin:18px auto;
padding:18px 28px;
background:white;
color:#ff5e62;
font-size:22px;
font-weight:bold;
border-radius:14px;
cursor:pointer;
text-decoration:none;
}

input{
display:none;
}

#status{
margin-top:15px;
font-size:16px;
}

.progress{
width:100%;
background:rgba(255,255,255,0.3);
border-radius:12px;
margin-top:15px;
overflow:hidden;
height:16px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:width 0.2s;
}

/* Luftballons */

.balloon{
position:absolute;
bottom:-120px;
width:60px;
height:80px;
border-radius:50%;
opacity:0.7;
animation:float 14s infinite ease-in;
}

.balloon:after{
content:"";
position:absolute;
width:2px;
height:60px;
background:white;
left:50%;
top:80px;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

</style>

</head>

<body>

<div class="card">

<h1>🎉 Party Fotos</h1>

<div id="counter">📸 Fotos werden gezählt...</div>

<label class="button">
📸 Fotos hochladen
<input type="file" id="fileInput" multiple>
</label>

<a class="button" href="https://nx70782.your-storageshare.de/s/X7fK3RMRtgo8FbA" target="_blank">
🖼 Fotos ansehen
</a>

<div id="status"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

<script>

/* Luftballons */

const colors=["#ffd166","#ef476f","#06d6a0","#118ab2","#ff4d6d"];

for(let i=0;i<12;i++){

let b=document.createElement("div");
b.className="balloon";

b.style.background=colors[Math.floor(Math.random()*colors.length)];
b.style.left=Math.random()*100+"vw";
b.style.animationDuration=(10+Math.random()*8)+"s";

document.body.appendChild(b);

}

/* Fotozähler laden */

async function loadCounter(){

try{

const res = await fetch("/count");
const data = await res.json();

document.getElementById("counter").innerHTML =
"📸 "+data.count+" Fotos wurden schon hochgeladen";

}catch(e){

document.getElementById("counter").innerHTML =
"📸 Fotos werden gesammelt";

}

}

loadCounter();

/* Upload */

const input=document.getElementById("fileInput");
const status=document.getElementById("status");
const bar=document.getElementById("bar");

input.addEventListener("change", async function(){

let files=input.files;

status.innerHTML="";

for(let file of files){

status.innerHTML="Upload läuft...";

let xhr=new XMLHttpRequest();

xhr.open("POST","/upload");

xhr.setRequestHeader("x-file-name",file.name);

xhr.upload.onprogress=function(e){

if(e.lengthComputable){

let percent=(e.loaded/e.total)*100;
bar.style.width=percent+"%";

}

};

xhr.onload=function(){

status.innerHTML="Upload erfolgreich 🎉";

confetti({
particleCount:160,
spread:80,
origin:{y:0.6}
});

bar.style.width="100%";

setTimeout(()=>{
bar.style.width="0%";
},1500);

input.value="";

setTimeout(loadCounter,1000);

};

xhr.onerror=function(){

status.innerHTML="Upload Fehler";

};

xhr.send(file);

}

});

</script>

</body>
</html>
