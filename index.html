<!DOCTYPE html>

<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ellis 40. Geburtstag</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
min-height:100vh;
padding:20px 16px;

display:flex;
justify-content:center;
align-items:flex-start;

color:white;
text-align:center;
overflow-x:hidden;

background:
radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,255,255,0.06), transparent 40%),
linear-gradient(135deg,#1f6f73,#2f8f87,#3fa39b);
}

/* Karte */

.card{
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);

padding:30px;
margin-top:30px;

border-radius:24px;

width:100%;
max-width:420px;

box-shadow:0 25px 60px rgba(0,0,0,0.45);
}

h1{
font-size:28px;
margin-bottom:8px;
}

.subtitle{
font-size:18px;
opacity:0.9;
margin-bottom:14px;
}

.description{
font-size:16px;
line-height:1.5;
opacity:0.9;
margin-bottom:18px;
}

#counter{
font-size:18px;
margin-bottom:20px;
}

/* Buttons */

.upload-btn,
.gallery-btn{

display:block;
margin:12px auto;

width:230px;
padding:15px 20px;

font-size:19px;
font-weight:bold;

border-radius:14px;
text-decoration:none;
cursor:pointer;

text-align:center;
transition:all 0.2s ease;

}

.upload-btn{
background:#ffd54f;
color:#333;
animation:pulse 2.5s infinite;
}

.gallery-btn{
background:#fff3b0;
color:#333;
}

.upload-btn:hover,
.gallery-btn:hover{
transform:scale(1.04);
}

@keyframes pulse{

0%{box-shadow:0 0 0 0 rgba(255,213,79,0.6);}
70%{box-shadow:0 0 0 16px rgba(255,213,79,0);}
100%{box-shadow:0 0 0 0 rgba(255,213,79,0);}

}

#status{
margin-top:14px;
font-size:17px;
font-weight:500;
min-height:24px;
}

/* Fortschrittsbalken */

.progress{
width:100%;
background:rgba(255,255,255,0.35);
border-radius:12px;
margin-top:14px;
overflow:hidden;
height:14px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:width 0.25s;
}

input{
display:none;
}

.footer{
margin-top:18px;
font-size:14px;
opacity:0.85;
}

/* Mobile */

@media (max-width:500px){

h1{font-size:24px;}
.subtitle{font-size:17px;}
.description{font-size:15px;}

.upload-btn,
.gallery-btn{
width:210px;
font-size:18px;
padding:14px;
}

}

</style>

</head>

<body>

<div class="card">

<h1>🎉 Ellis 40. Geburtstag</h1>

<div class="subtitle">
Schön, dass du mitfeierst!
</div>

<div class="description">
Lade hier deine schönsten Fotos von der Party hoch,
damit wir die besten Erinnerungen sammeln können.
</div>

<div id="counter">📸 Fotos werden gezählt...</div>

<label class="upload-btn">
📸 Fotos hochladen
<input type="file" id="fileInput" accept="image/*" multiple>
</label>
</a>
  
<<a class="gallery-btn"
href="/photos.html"
target="_blank">
🖼 Fotos ansehen
</a>

<div id="status"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="footer">
Danke fürs Mitfeiern und Teilen der Erinnerungen 🥂
</div>

</div>

<script>

/* Counter laden */

async function loadCounter(){

try{

const res = await fetch("/count");
const data = await res.json();

document.getElementById("counter").innerHTML =
"📸 "+data.count+" Fotos wurden schon hochgeladen";

}catch{

document.getElementById("counter").innerHTML =
"📸 Fotos werden gesammelt";

}

}

loadCounter();

/* Upload */

const input=document.getElementById("fileInput");
const status=document.getElementById("status");
const bar=document.getElementById("bar");

input.addEventListener("change",function(){

let files=input.files;

for(let file of files){

status.innerHTML="Upload läuft...";

let xhr=new XMLHttpRequest();

xhr.open("POST","/upload",true);

xhr.setRequestHeader("x-file-name",file.name);

xhr.upload.onprogress=function(e){

if(e.lengthComputable){

let percent=(e.loaded/e.total)*100;
bar.style.width=percent+"%";

}

};

xhr.onload=function(){

if(xhr.status===200){

status.innerHTML="Upload erfolgreich 🎉";

confetti({
particleCount:160,
spread:90,
origin:{y:0.6}
});

setTimeout(loadCounter,1000);

}else{

status.innerHTML="Upload fehlgeschlagen";

}

bar.style.width="0%";

};

xhr.onerror=function(){

status.innerHTML="Upload Fehler";
bar.style.width="0%";

};

xhr.send(file);

}

input.value="";

});

</script>

</body>
</html>
