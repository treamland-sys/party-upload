<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🎉 Ellis 40. Geburtstag</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
color:white;

background-image:url("https://images.unsplash.com/photo-1513151233558-d860c5398176");
background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;
padding:15px;
}

.card{

background:rgba(0,0,0,0.45);
backdrop-filter:blur(12px);

border-radius:20px;

padding:25px;

width:100%;
max-width:360px;

text-align:center;
}

h1{
font-size:24px;
margin-top:0;
}

.button{

display:block;
margin:12px auto;
padding:12px;

max-width:220px;
width:100%;

border-radius:12px;

font-weight:bold;
text-decoration:none;

cursor:pointer;
}

.upload{
background:#ffd54f;
color:black;
}

.gallery{
background:#fff3b0;
color:black;
}

.download{
background:#ffffffd0;
color:black;
}

input{
display:none;
}

</style>
</head>

<body>

<div class="card">

<h1>🎉 Ellis 40. Geburtstag</h1>

<p>
Lade hier deine schönsten Fotos von der Party hoch.
</p>

<label class="button upload">
📸 Fotos hochladen
<input type="file" id="fileInput" multiple>
</label>

<a class="button gallery" href="/photos.html">
🖼 Galerie ansehen
</a>

<a class="button download"
href="https://nx70782.your-storageshare.de/s/X7fK3RMRtgo8FbA"
target="_blank">
📁 Fotos später herunterladen
</a>

</div>

<script>

const input=document.getElementById("fileInput");

input.addEventListener("change", async function(){

for(const file of input.files){

await fetch("/upload",{
method:"POST",
headers:{
"x-file-name":file.name
},
body:file
});

}

confetti({
particleCount:120,
spread:80
});

});

</script>

</body>
</html>
