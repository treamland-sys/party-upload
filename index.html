<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🎉 Ellis 40. Geburtstag</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;

background-image:url("https://images.unsplash.com/photo-1513151233558-d860c5398176");
background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;
color:white;
}

.card{

background:rgba(0,0,0,0.45);
backdrop-filter:blur(10px);

border-radius:20px;

padding:25px;

width:100%;
max-width:380px;

text-align:center;

}

.buttons{

display:flex;
flex-direction:column;
align-items:center;
gap:14px;

}

/* Einheitliche Buttons */

.button{

display:flex;
justify-content:center;
align-items:center;

width:220px;
height:44px;

border-radius:12px;

font-weight:bold;
text-decoration:none;

cursor:pointer;

}

/* Upload pulsieren */

.upload{

background:#ffd54f;
color:black;

animation:pulse 2.5s infinite;

}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}

}

.gallery{
background:#fff3b0;
color:black;
}

.counter{
margin:12px 0;
font-weight:bold;
}

input{
display:none;
}

/* Mobile */

@media (max-width:500px){

.button{
width:200px;
height:42px;
}

}

</style>

</head>

<body>

<div class="card">

<h1>🎉 Ellis 40. Geburtstag</h1>

<div class="subtitle">
Schön, dass du mitfeierst!
</div>

<div class="description">
Lade hier deine schönsten Fotos und Videos von der Party hoch,
damit wir die besten Erinnerungen sammeln können.
</div>

<div id="counter">📸 Fotos werden gezählt...</div>

<label class="upload-btn">
📸 Fotos hochladen
<input type="file" id="fileInput" accept="image/*" multiple>
</label>

<a class="gallery-btn" href="photos.html">
🖼 Fotos ansehen
</a>

<div id="status"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="footer">
Danke fürs Mitfeiern und Teilen der Erinnerungen 🥂
</div>

</div>

<script>

async function loadCounter(){

const res = await fetch("/count");
const data = await res.json();

document.getElementById("counter").innerHTML =
"📸 "+data.count+" Fotos hochgeladen";

}

loadCounter();

const input=document.getElementById("fileInput");

input.addEventListener("change", async function(){

for(const file of input.files){

await fetch("/upload",{
method:"POST",
headers:{
"x-file-name":file.name
},
body:file
});

}

confetti({
particleCount:150,
spread:80
});

loadCounter();

});

</script>

</body>
</html>
