<!DOCTYPE html>

<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ellis 40. Geburtstag</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

/* BODY */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
overflow:hidden;

background:
radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,255,255,0.06), transparent 40%),
linear-gradient(135deg,#1f6f73,#2f8f87,#3fa39b);
}

/* KONFETTI PARTIKEL */

.confetti{
position:absolute;
width:6px;
height:6px;
opacity:0.7;
animation:fall linear infinite;
}

@keyframes fall{

0%{
transform:translateY(-10vh) rotate(0deg);
}

100%{
transform:translateY(110vh) rotate(360deg);
}

}

/* KARTE */

.card{
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
padding:40px;
border-radius:24px;
width:90%;
max-width:420px;
box-shadow:0 25px 60px rgba(0,0,0,0.45);
}

/* TITEL */

h1{
font-size:30px;
margin-bottom:8px;
}

.subtitle{
font-size:18px;
opacity:0.9;
margin-bottom:16px;
}

.description{
font-size:16px;
line-height:1.5;
opacity:0.9;
margin-bottom:20px;
}

/* COUNTER */

#counter{
font-size:18px;
margin-bottom:22px;
}

/* BUTTONS */

.upload-btn,
.gallery-btn{

display:block;
margin:12px auto;

width:240px;
padding:16px 20px;

font-size:20px;
font-weight:bold;

border-radius:14px;
text-decoration:none;
cursor:pointer;

text-align:center;
transition:all 0.2s ease;

}

/* Upload Button */

.upload-btn{
background:#ffd54f;
color:#333;
animation:pulse 2.5s infinite;
}

/* Galerie Button */

.gallery-btn{
background:#fff3b0;
color:#333;
}

/* Hover */

.upload-btn:hover,
.gallery-btn:hover{
transform:scale(1.04);
}

/* Pulsieren */

@keyframes pulse{

0%{
box-shadow:0 0 0 0 rgba(255,213,79,0.6);
}

70%{
box-shadow:0 0 0 16px rgba(255,213,79,0);
}

100%{
box-shadow:0 0 0 0 rgba(255,213,79,0);
}

}

/* STATUS */

#status{
margin-top:15px;
font-size:17px;
}

/* PROGRESSBAR */

.progress{
width:100%;
background:rgba(255,255,255,0.25);
border-radius:10px;
margin-top:20px;
overflow:hidden;
height:14px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:width 0.2s;
}

input{
display:none;
}

/* FOOTER */

.footer{
margin-top:24px;
font-size:14px;
opacity:0.85;
}

/* MOBILE */

@media (max-width:500px){

.card{
padding:28px;
}

h1{
font-size:26px;
}

.description{
font-size:15px;
}

.upload-btn,
.gallery-btn{
width:220px;
font-size:18px;
}

}

</style>

</head>
